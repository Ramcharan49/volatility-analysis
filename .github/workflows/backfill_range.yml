name: Backfill Range

on:
  workflow_dispatch:
    inputs:
      from_date:
        description: 'Start date (YYYY-MM-DD)'
        required: true
        type: string
      to_date:
        description: 'End date (YYYY-MM-DD)'
        required: true
        type: string

concurrency:
  group: pipeline
  cancel-in-progress: false

jobs:
  run-backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements-phase0.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements-phase0.txt

      - name: Run backfill
        env:
          SUPABASE_DB_URL_SESSION: ${{ secrets.SUPABASE_DB_URL_SESSION }}
          PHASE0_PROVIDER: nse_udiff
          PHASE0_DAILY_HISTORY_SOURCE: nse_udiff
          PHASE0_STRIKE_STEP: '100'
          PHASE0_STRIKES_AROUND_ATM: '15'
        run: |
          echo "::notice::Backfilling from ${{ github.event.inputs.from_date }} to ${{ github.event.inputs.to_date }}"
          python backfill.py \
            --from "${{ github.event.inputs.from_date }}" \
            --to "${{ github.event.inputs.to_date }}" \
            --mode daily \
            --daily-source nse_udiff
